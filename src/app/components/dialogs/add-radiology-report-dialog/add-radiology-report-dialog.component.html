<h2 mat-dialog-title>Create Radiology Report - {{ data.order.id }}</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="space-y-4 pt-2">
    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Radiologist</mat-label>
      <input
        matInput
        formControlName="radiologist"
        placeholder="e.g. Dr. Sarah Park"
      />
    </mat-form-field>

    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Findings</mat-label>
      <textarea
        matInput
        rows="5"
        formControlName="findings"
        placeholder="Detailed findings from the imaging study..."
      ></textarea>
    </mat-form-field>

    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Impression</mat-label>
      <textarea
        matInput
        rows="3"
        formControlName="impression"
        placeholder="Clinical impression and diagnosis..."
      ></textarea>
    </mat-form-field>

    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Recommendations</mat-label>
      <textarea
        matInput
        rows="3"
        formControlName="recommendations"
        placeholder="Follow-up recommendations..."
      ></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="close()">Cancel</button>
  <button mat-flat-button color="primary" type="button" (click)="submit()">
    Finalize Report
  </button>
</mat-dialog-actions>
